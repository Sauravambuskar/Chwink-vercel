<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <rect width="320" height="160" fill="white"/>
  <!-- posco lowercase - matches the official rounded POSCO typeface -->
  <text
    x="50%"
    y="90"
    font-family="'Arial Rounded MT Bold', 'Nunito', 'Varela Round', Arial, sans-serif"
    font-size="72"
    font-weight="700"
    fill="#1a6896"
    text-anchor="middle"
    letter-spacing="-1"
  >posco</text>
  <!-- ISDC subtitle -->
  <text
    x="50%"
    y="135"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="30"
    font-weight="700"
    fill="#1a6896"
    text-anchor="middle"
    letter-spacing="4"
  >ISDC</text>
</svg>
