<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!-- Background -->
  <rect width="480" height="120" fill="white"/>

  <!-- Hyosung T emblem circle -->
  <circle cx="52" cy="60" r="46" fill="none" stroke="#1a3a8a" stroke-width="4"/>

  <!-- T symbol inside circle -->
  <!-- Horizontal top bar of T -->
  <rect x="24" y="28" width="56" height="10" fill="#1a3a8a" rx="2"/>
  <!-- Vertical stem of T -->
  <rect x="44" y="38" width="16" height="36" fill="#1a3a8a" rx="1"/>
  <!-- Left decorative lines (pipe-like) -->
  <rect x="24" y="45" width="6" height="22" fill="#1a3a8a" rx="1"/>
  <rect x="32" y="45" width="4" height="22" fill="#1a3a8a" rx="1"/>
  <!-- Right decorative lines -->
  <rect x="70" y="45" width="6" height="22" fill="#1a3a8a" rx="1"/>
  <rect x="64" y="45" width="4" height="22" fill="#1a3a8a" rx="1"/>
  <!-- Bottom feet of T -->
  <rect x="24" y="67" width="56" height="8" fill="#1a3a8a" rx="2"/>

  <!-- HYOSUNG text -->
  <text x="115" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#1a3a8a" letter-spacing="2">HYOSUNG</text>

  <!-- T&amp;D text -->
  <text x="370" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#1a3a8a" letter-spacing="2">T&amp;D</text>
</svg>
